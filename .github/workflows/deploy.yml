name: Deploy to Netlify

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Deploy to Netlify
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          apt-get install -y zip 2>/dev/null || true
          cd dist && zip -r /tmp/deploy.zip . && cd ..
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @/tmp/deploy.zip \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys")
          echo "Deploy response state: $(echo $RESPONSE | grep -o '"state":"[^"]*"')"
          STATE=$(echo $RESPONSE | grep -o '"state":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ "$STATE" = "ready" ] || [ "$STATE" = "uploaded" ]; then
            echo "✅ Deploy successful"
          else
            echo "❌ Deploy may have failed. Response: $RESPONSE"
            exit 1
          fi
