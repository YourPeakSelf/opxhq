<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="glow3" cx="35%" cy="35%" r="55%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <clipPath id="circle3">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="#000000"/>

  <!-- Subtle radial glow -->
  <circle cx="200" cy="200" r="200" fill="url(#glow3)"/>

  <!-- OPTIMIZE micro-label -->
  <text x="200" y="148"
    font-family="Inter, Arial, sans-serif"
    font-weight="700"
    font-size="18"
    fill="#00e5ff"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="6">OPTIMIZE</text>

  <!-- OPX text - large -->
  <text x="200" y="228"
    font-family="Inter, Arial Black, sans-serif"
    font-weight="900"
    font-size="158"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-5">OPX</text>

  <!-- opxhq.com caption -->
  <text x="200" y="306"
    font-family="Inter, Arial, sans-serif"
    font-weight="400"
    font-size="16"
    fill="rgba(255,255,255,0.3)"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="1">opxhq.com</text>
</svg>
