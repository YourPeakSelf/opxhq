<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>

    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="60%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#121212"/>
    </linearGradient>

    <!-- Cyan glow left -->
    <radialGradient id="glowLeft" cx="20%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </radialGradient>

    <!-- Cyan glow right -->
    <radialGradient id="glowRight" cx="80%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </radialGradient>

    <!-- Grid line fade mask -->
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:1"/>
      <stop offset="25%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="75%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:1"/>
    </linearGradient>
    <mask id="gridMask">
      <rect width="1500" height="500" fill="url(#gridFade)"/>
    </mask>

    <!-- Text glow filter -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle drop shadow for OPX -->
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#00e5ff" flood-opacity="0.25"/>
    </filter>

  </defs>

  <!-- ── BASE ───────────────────────────────────────────────── -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>

  <!-- Ambient glow layers -->
  <rect width="1500" height="500" fill="url(#glowLeft)"/>
  <rect width="1500" height="500" fill="url(#glowRight)"/>

  <!-- ── GRID LINES ─────────────────────────────────────────── -->
  <g mask="url(#gridMask)" opacity="0.18">
    <!-- Vertical lines -->
    <line x1="150" y1="0" x2="150" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="1050" y1="0" x2="1050" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="1200" y1="0" x2="1200" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="1350" y1="0" x2="1350" y2="500" stroke="#00e5ff" stroke-width="0.5"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="100" x2="1500" y2="100" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1500" y2="200" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1500" y2="300" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1500" y2="400" stroke="#00e5ff" stroke-width="0.5"/>
  </g>

  <!-- ── PEAK CHEVRON (large, left-of-center) ──────────────── -->
  <!-- Outer glow chevron -->
  <polyline points="480,310 620,155 760,310"
    fill="none" stroke="#00e5ff" stroke-width="3" opacity="0.15"
    stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Echo chevron -->
  <polyline points="530,310 620,210 710,310"
    fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.1"
    stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Main chevron -->
  <polyline points="460,318 620,140 780,318"
    fill="none" stroke="#00e5ff" stroke-width="5" opacity="0.7"
    stroke-linejoin="round" stroke-linecap="round"
    filter="url(#cyanGlow)"/>
  <!-- Bright core chevron -->
  <polyline points="460,318 620,140 780,318"
    fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="1"
    stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Vertical drop line from peak -->
  <line x1="620" y1="140" x2="620" y2="380" stroke="#00e5ff" stroke-width="1" opacity="0.2" stroke-dasharray="6 5"/>
  <!-- Peak dot -->
  <circle cx="620" cy="140" r="5" fill="#00e5ff" opacity="0.9" filter="url(#cyanGlow)"/>

  <!-- ── OPX WORDMARK ───────────────────────────────────────── -->
  <text x="850" y="262"
    font-family="Inter, Arial Black, sans-serif"
    font-weight="900"
    font-size="200"
    fill="#ffffff"
    text-anchor="start"
    dominant-baseline="middle"
    letter-spacing="-6"
    filter="url(#textShadow)">OPX</text>

  <!-- ── TAGLINE (below OPX, clear of letterforms) ─────────── -->
  <text x="856" y="388"
    font-family="Inter, Arial, sans-serif"
    font-weight="500"
    font-size="20"
    fill="#00e5ff"
    text-anchor="start"
    dominant-baseline="middle"
    letter-spacing="5">OPTIMIZE EVERYTHING</text>

  <!-- ── TOP ACCENT LINE ───────────────────────────────────── -->
  <line x1="0" y1="3" x2="1500" y2="3" stroke="#00e5ff" stroke-width="3" opacity="0.6"/>

  <!-- ── BOTTOM ACCENT LINE ────────────────────────────────── -->
  <line x1="0" y1="497" x2="1500" y2="497" stroke="#00e5ff" stroke-width="1.5" opacity="0.3"/>

  <!-- ── PILL TAGS (bottom left) ───────────────────────────── -->
  <rect x="40" y="434" width="140" height="32" rx="16" fill="rgba(0,229,255,0.08)" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="110" y="450" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#00e5ff" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">PEPTIDES</text>

  <rect x="194" y="434" width="156" height="32" rx="16" fill="rgba(0,229,255,0.08)" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="272" y="450" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#00e5ff" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">LOOKSMAXXING</text>

  <rect x="364" y="434" width="140" height="32" rx="16" fill="rgba(0,229,255,0.08)" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="434" y="450" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#00e5ff" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">BIOHACKING</text>

  <rect x="518" y="434" width="130" height="32" rx="16" fill="rgba(0,229,255,0.08)" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="583" y="450" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#00e5ff" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">NUTRITION</text>

  <rect x="662" y="434" width="118" height="32" rx="16" fill="rgba(0,229,255,0.08)" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="721" y="450" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#00e5ff" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">FITNESS</text>

  <!-- ── URL (bottom right) ────────────────────────────────── -->
  <text x="1460" y="455"
    font-family="Inter, Arial, sans-serif"
    font-weight="400"
    font-size="16"
    fill="rgba(255,255,255,0.25)"
    text-anchor="end"
    dominant-baseline="middle"
    letter-spacing="1">opxhq.com</text>

</svg>
