<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <clipPath id="circle2">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="#0a0a0a"/>

  <!-- Subtle inner ring -->
  <circle cx="200" cy="200" r="192" fill="none" stroke="#1e1e1e" stroke-width="3"/>

  <!-- Peak / chevron icon - main -->
  <polyline points="128,172 200,108 272,172"
    fill="none" stroke="#00e5ff" stroke-width="10"
    stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Peak / chevron - echo (dimmed) -->
  <polyline points="160,200 200,166 240,200"
    fill="none" stroke="#00e5ff" stroke-width="5" opacity="0.25"
    stroke-linejoin="round" stroke-linecap="round"/>

  <!-- OPX text -->
  <text x="200" y="282"
    font-family="Inter, Arial Black, sans-serif"
    font-weight="900"
    font-size="118"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-3">OPX</text>

  <!-- Thin line separator -->
  <line x1="152" y1="326" x2="248" y2="326" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
</svg>
